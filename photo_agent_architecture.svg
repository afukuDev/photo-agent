<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 980" width="1320" height="980" font-family="Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="1320" height="980" fill="#F8F9FA" rx="12"/>

  <!-- Title -->
  <text x="660" y="44" text-anchor="middle" font-size="28" font-weight="bold" fill="#1A237E">Photo Agent — 技術架構圖</text>

  <!-- ═══════════════════════════════════════════════
       LAYER LABELS (left margin)
  ═══════════════════════════════════════════════ -->
  <!-- Layer 1: GUI -->
  <rect x="10" y="75" width="34" height="200" rx="6" fill="#3949AB" opacity="0.85"/>
  <text x="27" y="220" text-anchor="middle" font-size="15" font-weight="bold" fill="white" transform="rotate(-90,27,220)">GUI 介面層</text>

  <!-- Layer 2: Index -->
  <rect x="10" y="305" width="34" height="200" rx="6" fill="#388E3C" opacity="0.85"/>
  <text x="27" y="450" text-anchor="middle" font-size="15" font-weight="bold" fill="white" transform="rotate(-90,27,450)">索引 / 計算層</text>

  <!-- Layer 3: Storage -->
  <rect x="10" y="535" width="34" height="230" rx="6" fill="#7B1FA2" opacity="0.85"/>
  <text x="27" y="690" text-anchor="middle" font-size="15" font-weight="bold" fill="white" transform="rotate(-90,27,690)">持久化儲存</text>

  <!-- Layer 4: Post -->
  <rect x="10" y="795" width="34" height="155" rx="6" fill="#E64A19" opacity="0.85"/>
  <text x="27" y="895" text-anchor="middle" font-size="15" font-weight="bold" fill="white" transform="rotate(-90,27,895)">後處理層</text>

  <!-- ═══════════════════════════════════════════════
       LAYER 1 — GUI
  ═══════════════════════════════════════════════ -->
  <rect x="55" y="75" width="1250" height="200" rx="10" fill="#E8EAF6" stroke="#3949AB" stroke-width="2"/>

  <!-- PhotoAgentApp -->
  <rect x="110" y="105" width="480" height="140" rx="10" fill="#5C6BC0" stroke="#3949AB" stroke-width="1.5"/>
  <text x="350" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="white">photo_agent_app.py</text>
  <text x="350" y="163" text-anchor="middle" font-size="16" fill="#E8EAF6">PhotoAgentApp（整合 GUI）</text>
  <text x="350" y="186" text-anchor="middle" font-size="14" fill="#C5CAE9">資料夾選擇 → 模型設定 → 索引 → 審閱</text>
  <text x="350" y="207" text-anchor="middle" font-size="14" fill="#C5CAE9">IndexWorker (QThread) + subprocess</text>

  <!-- ReviewWindow -->
  <rect x="730" y="105" width="520" height="140" rx="10" fill="#5C6BC0" stroke="#3949AB" stroke-width="1.5"/>
  <text x="990" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="white">photo_agent_review.py</text>
  <text x="990" y="163" text-anchor="middle" font-size="16" fill="#E8EAF6">ReviewWindow（獨立審閱 GUI）</text>
  <text x="990" y="186" text-anchor="middle" font-size="14" fill="#C5CAE9">需傳入 --report analysis_report.json</text>
  <text x="990" y="207" text-anchor="middle" font-size="14" fill="#C5CAE9">無法自行啟動索引</text>

  <!-- arrow APP -> REVIEW (share logic note) -->
  <line x1="590" y1="175" x2="730" y2="175" stroke="#9FA8DA" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="660" y="169" text-anchor="middle" font-size="12" fill="#3949AB">共用後處理邏輯</text>

  <!-- ═══════════════════════════════════════════════
       ARROW: GUI → Processing
  ═══════════════════════════════════════════════ -->
  <!-- APP → PROCESS -->
  <line x1="350" y1="245" x2="350" y2="305" stroke="#388E3C" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="358" y="282" font-size="13" fill="#388E3C">subprocess 呼叫</text>

  <!-- ═══════════════════════════════════════════════
       LAYER 2 — Processing
  ═══════════════════════════════════════════════ -->
  <rect x="55" y="305" width="1250" height="200" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>

  <!-- photo_agent_process.py -->
  <rect x="110" y="330" width="560" height="150" rx="10" fill="#43A047" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="390" y="363" text-anchor="middle" font-size="20" font-weight="bold" fill="white">photo_agent_process.py（索引引擎 CLI）</text>
  <text x="390" y="388" text-anchor="middle" font-size="14" fill="#C8E6C9">① pHash → 近似重複偵測（Union-Find 連通元件）</text>
  <text x="390" y="409" text-anchor="middle" font-size="14" fill="#C8E6C9">② image_quality() → sharpness（Laplacian var）+ exposure</text>
  <text x="390" y="430" text-anchor="middle" font-size="14" fill="#C8E6C9">③ DINOv2 batch embed → faiss.normalize_L2</text>
  <text x="390" y="451" text-anchor="middle" font-size="14" fill="#C8E6C9">④ DBSCAN(eps, min_samples=2, metric="cosine") 語義分群</text>
  <text x="390" y="467" text-anchor="middle" font-size="13" fill="#A5D6A7">增量重用：key=(path, size, mtime_ns)  →  跳過已處理圖片</text>

  <!-- DINOv2 Model -->
  <rect x="810" y="330" width="440" height="150" rx="10" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="1030" y="363" text-anchor="middle" font-size="20" font-weight="bold" fill="white">DINOv2 Model</text>
  <text x="1030" y="391" text-anchor="middle" font-size="15" fill="#E8F5E9">facebook/dinov2-{large|base|small|giant}</text>
  <text x="1030" y="414" text-anchor="middle" font-size="14" fill="#C8E6C9">local_files_only=True（需預先下載）</text>
  <text x="1030" y="437" text-anchor="middle" font-size="14" fill="#C8E6C9">CLS token：last_hidden_state[:, 0, :]</text>
  <text x="1030" y="460" text-anchor="middle" font-size="14" fill="#C8E6C9">輸出：1024-dim float32 向量</text>

  <!-- PROCESS ↔ DINOv2 -->
  <line x1="670" y1="405" x2="810" y2="405" stroke="#1B5E20" stroke-width="2" marker-end="url(#arr-darkgreen)"/>
  <text x="740" y="396" text-anchor="middle" font-size="12" fill="#1B5E20">batch images</text>
  <line x1="810" y1="425" x2="670" y2="425" stroke="#1B5E20" stroke-width="2" marker-end="url(#arr-darkgreen)"/>
  <text x="740" y="444" text-anchor="middle" font-size="12" fill="#1B5E20">1024-dim vectors</text>

  <!-- ═══════════════════════════════════════════════
       ARROW: Processing → Storage
  ═══════════════════════════════════════════════ -->
  <line x1="390" y1="480" x2="390" y2="535" stroke="#7B1FA2" stroke-width="2.5" marker-end="url(#arr-purple)"/>
  <text x="400" y="515" font-size="13" fill="#7B1FA2">寫入持久化檔案</text>

  <!-- ═══════════════════════════════════════════════
       LAYER 3 — Storage
  ═══════════════════════════════════════════════ -->
  <rect x="55" y="535" width="1250" height="230" rx="10" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="680" y="560" text-anchor="middle" font-size="15" font-weight="bold" fill="#4A148C">_photo_agent_staging/</text>

  <!-- metadata.json -->
  <rect x="80" y="572" width="215" height="170" rx="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="187" y="600" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A0030">metadata.json</text>
  <text x="187" y="622" text-anchor="middle" font-size="13" fill="#1A0030">路徑 / size / mtime_ns</text>
  <text x="187" y="641" text-anchor="middle" font-size="13" fill="#1A0030">phash_int</text>
  <text x="187" y="660" text-anchor="middle" font-size="13" fill="#1A0030">sharpness / exposure</text>
  <text x="187" y="679" text-anchor="middle" font-size="12" fill="#4A148C">← 增量 key 來源</text>

  <!-- embeddings.npy -->
  <rect x="310" y="572" width="215" height="170" rx="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="417" y="600" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A0030">embeddings.npy</text>
  <text x="417" y="625" text-anchor="middle" font-size="13" fill="#1A0030">shape: [N × 1024]</text>
  <text x="417" y="647" text-anchor="middle" font-size="13" fill="#1A0030">dtype: float32</text>
  <text x="417" y="669" text-anchor="middle" font-size="13" fill="#1A0030">L2 正規化後向量</text>
  <text x="417" y="691" text-anchor="middle" font-size="12" fill="#4A148C">← 增量 key 來源</text>

  <!-- faiss.index -->
  <rect x="540" y="572" width="215" height="170" rx="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="647" y="600" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A0030">faiss.index</text>
  <text x="647" y="625" text-anchor="middle" font-size="13" fill="#1A0030">IndexFlatIP</text>
  <text x="647" y="647" text-anchor="middle" font-size="13" fill="#1A0030">L2 正規化 ≡ cosine</text>
  <text x="647" y="669" text-anchor="middle" font-size="12" fill="#1A0030">ASCII 暫存路徑中轉</text>
  <text x="647" y="689" text-anchor="middle" font-size="12" fill="#1A0030">（Windows 相容）</text>

  <!-- analysis_report.json -->
  <rect x="770" y="572" width="255" height="170" rx="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="897" y="600" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A0030">analysis_report.json</text>
  <text x="897" y="624" text-anchor="middle" font-size="13" fill="#1A0030">duplicate_groups（pHash）</text>
  <text x="897" y="645" text-anchor="middle" font-size="13" fill="#1A0030">similar_groups（DINOv2）</text>
  <text x="897" y="666" text-anchor="middle" font-size="13" fill="#1A0030">combined_score 排序</text>
  <text x="897" y="687" text-anchor="middle" font-size="12" fill="#1A0030">= 0.7×sharpness + 0.3×exposure</text>
  <text x="897" y="706" text-anchor="middle" font-size="12" fill="#4A148C">← GUI 讀取分群結果</text>

  <!-- move_plan.json + reviewed_moves/ -->
  <rect x="1040" y="572" width="240" height="170" rx="8" fill="#BA68C8" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="1160" y="600" text-anchor="middle" font-size="16" font-weight="bold" fill="white">move_plan.json</text>
  <text x="1160" y="624" text-anchor="middle" font-size="13" fill="#F3E5F5">move_paths / keep_paths</text>
  <text x="1160" y="648" text-anchor="middle" font-size="13" fill="#F3E5F5">────────────────</text>
  <text x="1160" y="670" text-anchor="middle" font-size="16" font-weight="bold" fill="white">reviewed_moves/</text>
  <text x="1160" y="694" text-anchor="middle" font-size="13" fill="#F3E5F5">保留原相對路徑結構</text>
  <text x="1160" y="715" text-anchor="middle" font-size="13" fill="#F3E5F5">可復原的暫存區</text>

  <!-- ═══════════════════════════════════════════════
       ARROWS: Storage ↔ GUI (read report)
  ═══════════════════════════════════════════════ -->
  <!-- analysis_report -> PhotoAgentApp (read) -->
  <path d="M 897 572 C 897 515 350 300 350 245" fill="none" stroke="#3949AB" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arr-blue)"/>
  <!-- analysis_report -> ReviewWindow (read) -->
  <path d="M 990 572 C 990 515 990 300 990 245" fill="none" stroke="#3949AB" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arr-blue)"/>
  <text x="1008" y="400" font-size="13" fill="#3949AB">讀取分群結果</text>

  <!-- APP -> move_plan (save_plan) -->
  <path d="M 590 175 C 1160 175 1160 410 1160 572" fill="none" stroke="#E64A19" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arr-red)"/>
  <text x="1170" y="382" font-size="13" fill="#E64A19">save_plan()</text>

  <!-- ═══════════════════════════════════════════════
       ARROWS: Storage → Post-processing
  ═══════════════════════════════════════════════ -->
  <line x1="350" y1="795" x2="350" y2="742" stroke="#E64A19" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <line x1="990" y1="795" x2="1160" y2="742" stroke="#E64A19" stroke-width="2.5" marker-end="url(#arr-red)"/>

  <!-- ═══════════════════════════════════════════════
       LAYER 4 — Post-processing
  ═══════════════════════════════════════════════ -->
  <rect x="55" y="795" width="1250" height="160" rx="10" fill="#FBE9E7" stroke="#E64A19" stroke-width="2"/>

  <!-- move_files -->
  <rect x="110" y="820" width="520" height="115" rx="10" fill="#FF7043" stroke="#E64A19" stroke-width="1.5"/>
  <text x="370" y="853" text-anchor="middle" font-size="20" font-weight="bold" fill="white">photo_agent_move.py  →  move_files()</text>
  <text x="370" y="878" text-anchor="middle" font-size="14" fill="#FFCCBC">讀取 move_plan.json → shutil.move → reviewed_moves/</text>
  <text x="370" y="900" text-anchor="middle" font-size="14" fill="#FFCCBC">跳過：missing / already_in_staging</text>
  <text x="370" y="920" text-anchor="middle" font-size="14" fill="#FFCCBC">unique_destination() 防同名覆蓋 → move_log.json</text>

  <!-- delete_staged_images -->
  <rect x="690" y="820" width="560" height="115" rx="10" fill="#F4511E" stroke="#BF360C" stroke-width="1.5"/>
  <text x="970" y="853" text-anchor="middle" font-size="20" font-weight="bold" fill="white">photo_agent_cleanup.py  →  delete_staged_images()</text>
  <text x="970" y="878" text-anchor="middle" font-size="14" fill="#FFCCBC">staged_image_files() 掃描 → pending_delete_list.txt</text>
  <text x="970" y="900" text-anchor="middle" font-size="14" fill="#FFCCBC">需輸入精確字串 "yes" 才執行 path.unlink()</text>
  <text x="970" y="920" text-anchor="middle" font-size="14" fill="#FFCCBC">path.relative_to(staging) 驗證防越界 → delete_log.json</text>

  <!-- APP/REVIEW → move & cleanup -->
  <path d="M 350 245 C 110 270 110 795 110 820" fill="none" stroke="#E64A19" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <path d="M 350 245 C 690 270 690 795 690 820" fill="none" stroke="#BF360C" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>

  <!-- ═══════════════════════════════════════════════
       ARROW MARKERS
  ═══════════════════════════════════════════════ -->
  <defs>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388E3C"/>
    </marker>
    <marker id="arr-darkgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B5E20"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7B1FA2"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E64A19"/>
    </marker>
  </defs>

</svg>
